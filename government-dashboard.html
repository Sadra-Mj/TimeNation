<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Time Nation — Government Dashboard</title>
  <meta name="description" content="Government dashboard for Time Nation citizen applications." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <main class="govDashboardWrap wrap">
    <section class="govDashboardTop glass">
      <div>
        <div class="govBadge">INTERNAL GOVERNMENT PANEL</div>
        <h1>Citizen Applications</h1>
        <p>Review submitted citizen information and uploaded files.</p>
      </div>
      <button id="governmentLogoutBtn" type="button" class="ghost">Logout</button>
    </section>

    <section class="govDashboardBody">
      <div id="governmentDashboardStatus" class="govStatus govStatus--spaced">Loading citizen applications...</div>
      <div id="citizensList" class="citizensGrid"></div>
    </section>
  </main>

  <script src="government.js"></script>
</body>
</html>
